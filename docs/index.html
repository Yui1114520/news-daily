<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌍 国际时政日报</title>
<style>
  body { font-family: sans-serif; text-align: center; padding: 50px; color: #666; background: #f0f2f5; }
  .spinner { font-size: 40px; animation: spin 1s linear infinite; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <div class="spinner">📡</div>
  <h2>今日新闻正在生成中...</h2>
  <p>请稍后刷新，或直接在微信中查看推送消息</p>
</body>
</html>
